services:
  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-REDACTED_PASSWORD}
    ports:
      - "7687:7687"
      - "7474:7474"
    volumes:
      - neo4j_data:/data

  chromadb:
    image: chromadb/chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma

  layerkg:
    build: .
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-REDACTED_PASSWORD}
      CHROMA_PERSIST_DIR: /data/chroma
    depends_on:
      - neo4j
      - chromadb
    volumes:
      - ./data:/data
    profiles:
      - cli

volumes:
  neo4j_data:
  chroma_data:
