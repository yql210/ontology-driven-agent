actions:
  refactor:
    intent_type: refactor
    trigger_hint: "用户要求重构、拆分、优化代码，或说太臃肿/太长/太复杂"
    bind_to: code_entity
    submission_criteria:
      - "entity exists"
      - "entity.lines > 100"
    functions:
      - check_refactor_eligibility
    requires_approval: false

  document:
    intent_type: document
    trigger_hint: "用户要求写文档、补注释、补全文档"
    bind_to: code_entity
    submission_criteria:
      - "entity exists"
    functions:
      - generate_api_doc
    requires_approval: false

  analyze_impact:
    intent_type: analyze_impact
    trigger_hint: "用户要求分析影响范围、查看调用链、查看依赖"
    bind_to: code_entity
    submission_criteria:
      - "entity exists"
    functions:
      - trace_call_chain
    requires_approval: false

  extract_interface:
    intent_type: extract_interface
    trigger_hint: "用户要求提取接口、抽象类、解耦"
    bind_to: code_entity
    submission_criteria:
      - "entity exists"
    functions:
      - extract_interface
    requires_approval: false
