version: "2.1"

shapes:
  - id: shape:sensitive_data
    name: 敏感数据保护
    description: "操作 restricted/confidential 数据的 CodeEntity 需要额外审查"
    kind: operational
    target:
      entry_type: CodeEntity
      operation: UPDATE
    path: "PROCESSES_DATA -> DataAsset"
    constraint:
      field: sensitivity
      operator: in
      value: [restricted, confidential]
    severity: block
    priority: 10
    tags: [data_privacy, pii]
    suggestion: |
      该代码处理敏感数据。可选:
      (a) 降级关联 DataAsset 的 sensitivity 标签
      (b) 申请临时豁免（24h TTL）
      (c) 寻找不涉及敏感数据的替代方案

  - id: shape:compliance_check
    name: 合规要求检查
    description: "操作 critical/high 级合规要求关联的 CodeEntity"
    kind: operational
    target:
      entry_type: CodeEntity
      operation: UPDATE
    path: "SUBJECT_TO -> ComplianceItem"
    constraint:
      field: severity
      operator: in
      value: [critical, high]
    severity: block
    priority: 8
    tags: [compliance, regulatory]
    suggestion: |
      该代码关联高严重性合规要求。可选:
      (a) 降级 ComplianceItem 的 severity
      (b) 申请合规豁免
      (c) 在合规沙箱环境中执行操作

  - id: shape:http_entry_point
    name: HTTP/RPC 入口点保护
    description: "修改 http_api/rpc_service 入口点需发出警告"
    kind: operational
    target:
      entry_type: CodeEntity
      operation: UPDATE
    path: "SELF"
    constraint:
      field: entryCategory
      operator: in
      value: [http_api, rpc_service]
    severity: warn
    priority: 5
    tags: [api_surface, entry_point]
    suggestion: |
      修改系统对外接口入口。建议:
      (a) 确认不破坏 API 契约
      (b) 检查下游调用方
      (c) 更新 API 文档

  - id: shape:refactor_large_code_unit
    name: 大型代码单元重构保护
    description: "重构 lines > 100 的 CodeEntity 时发出提示（迁移自 submission_criteria: entity.lines > 100）"
    kind: structural
    target:
      entry_type: CodeEntity
      operation: UPDATE
    path: "SELF"
    constraint:
      field: lines
      operator: ">"
      value: 100
    severity: warn
    priority: 3
    tags: [refactor, size_guard]
    suggestion: |
      目标代码单元行数较多（> 100），重构前请:
      (a) 优先拆分为更小的可测试单元
      (b) 确认现有测试覆盖足够
      (c) 评估变更影响范围

  - id: shape:upstream_call_chain_risk
    name: 上游调用链入口点检查
    description: "反向遍历CALLS调用链，检查上游是否有HTTP/RPC入口点"
    kind: operational
    target:
      entry_type: CodeEntity
      operation: UPDATE
    path: "^CALLS{1,5} -> CodeEntity"
    max_depth: 5
    constraint:
      field: entryCategory
      operator: in
      value: [http_api, rpc_service]
    severity: warn
    priority: 6
    tags: [call_chain, entry_point, upstream]
    suggestion: |
      调用链上游存在HTTP/RPC入口点。建议:
      (a) 确认修改不影响API契约
      (b) 检查下游调用方兼容性
