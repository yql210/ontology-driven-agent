traversal_constraints:
  data_sensitivity:
    name: data_sensitivity
    source_label: "CodeEntity"
    relation_chain: ["PROCESSES_DATA"]
    target_label: "DataAsset"
    collect_property: "sensitivity"
    value_mapping:
      restricted: "block"
      confidential: "warn"
      internal: "allow"
      public: "allow"
    aggregation: "max"

  data_sensitivity_check:
    name: data_sensitivity_check
    source_label: "CodeEntity"
    relation_chain: ["PROCESSES_DATA"]
    target_label: "DataAsset"
    collect_property: "sensitivity"
    value_mapping:
      restricted: "warn"
      confidential: "warn"
      internal: "allow"
      public: "allow"
    aggregation: "max"

propagation_rules:
  upstream_risk:
    name: upstream_risk
    along: ["CALLS"]
    direction: "backward"
    max_depth: 5
    collect_property: "entryCategory"
    value_mapping:
      http_api: "warn"
      rpc_service: "warn"
      scheduled: "allow"
      mq_consumer: "allow"
      event_handler: "allow"
    aggregation: "exists"
